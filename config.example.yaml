# LarkListener 配置模板 —— 列出全部配置项。
# 本文件含明文 api_key：工具会以 0600 权限创建并在每次写回时保持。
# 有默认值的项已填默认值；无默认值的项留空，需自行填写。

# 【必填，无默认值】承载本服务的 lark-cli bot 的 appId（见 `lark-cli profile list`）。
# 所有 lark-cli 调用会被钉死在这个 bot 上，不受全局 active profile 影响。
# 修改后需 `lark-listener restart` 才生效（bot 监听子进程按启动时的 profile 订阅）。
lark_cli_appid:

# 轮询间隔（秒）。默认 300。填 0 关闭自动轮询（服务保持在线，仅 Bot 按需
# 汇总/改配置）；负数按 0 处理，非法值（字符串等）回退 300。
poll_interval: 300

# 是否汇总 @所有人 的消息（命中关键词的仍会汇总）。默认 true。
include_at_all: true

# AI 分析时为每个会话额外拉取的上下文消息数（0 表示不拉取）。默认 20。
# 负数按 0 处理，非法值（字符串等）回退 20。
context_messages: 20

# 关注的关键词（命中即汇总）。默认空列表。示例：
#   keywords:
#     - 部署
#     - 故障
keywords: []

# 屏蔽的聊天 chat_id（这些聊天的消息不会被汇总）。默认空列表。
# Bot 自身会话由 setup 自动加入；不可经 Bot 指令移除，`config set --remove`
# 需加 --force（防止汇总消息被自身轮询命中形成自反馈）。示例：
#   exclude_chat_ids:
#     - oc_xxxxxxxxxxxx    # LarkListener Bot
exclude_chat_ids: []

# AI 模型配置
ai:
  # 【必填，无默认值】AI 后端：claude / openai / ollama。
  provider:
  # 【必填，无默认值】模型名称（如 claude-sonnet-4-6 / gpt-4o / qwen2.5:7b）。
  model:
  # API Key（claude / openai 必填；ollama 本地模型留空即可）。无默认值。
  api_key:
  # 自定义 / 兼容端点的 base_url（openai 兼容 / ollama / claude 兼容网关均适用）。默认空字符串。
  base_url: ""

# 推送目标
notify:
  # 【必填，无默认值】接收汇总的用户 open_id（ou_xxx）。
  user_id:
  # 【必填，无默认值】Bot 与你的私聊 chat_id（oc_xxx）。缺失会导致服务启动即报错。
  bot_chat_id:
